<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AETHERYON · IDE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════════════════
   AETHERYON · IDE MODULE CSS - v4 Optimizado
═══════════════════════════════════════════════════ */
:root {
  --c:#00f5ff;  --cd:#00b8c4; --cg:rgba(0,245,255,.07);
  --m:#ff00a8;  --mg:rgba(255,0,168,.07);
  --go:#ffd700; --gr:#00ff88; --re:#ff2244;
  --bg:#020509; --bg2:#060d14; --bg3:#0a131e; --bg4:#0f1c2a;
  --sf:rgba(0,245,255,.04); --br:rgba(0,245,255,.16); --br2:rgba(0,245,255,.08);
  --tx:#9ecdd6; --td:#3f6b75;
  --font-hd:'Orbitron',monospace;
  --font-mo:'Share Tech Mono',monospace;
  --font-bd:'Rajdhani',sans-serif;
  --font-code:'JetBrains Mono',monospace;
  --lh:23.4px;
  --gutter-width:60px;
  --toolbar-h:52px;
  --projectbar-h:36px;
  --tabbar-h:36px;
  --statusbar-h:24px;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:var(--font-bd);font-size:14px}

body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,
  rgba(0,245,255,.006) 2px,rgba(0,245,255,.006) 4px)}

#app{display:grid;grid-template-rows:var(--toolbar-h) var(--projectbar-h) var(--tabbar-h) 1fr var(--statusbar-h);height:100vh;overflow:hidden;}

/* ════════ TOOLBAR ════════ */
#toolbar{background:rgba(2,5,9,.97);border-bottom:1px solid var(--br);
  display:flex;align-items:center;gap:10px;padding:0 14px;backdrop-filter:blur(20px);z-index:100}

.brand{display:flex;align-items:center;gap:8px;padding-right:12px;border-right:1px solid var(--br);flex-shrink:0}
.brand-logo{font-family:var(--font-hd);font-size:12px;font-weight:900;letter-spacing:.18em;
  color:#fff;text-shadow:0 0 12px var(--c),0 0 24px rgba(0,245,255,.2)}
.brand-sub{font-family:var(--font-mo);font-size:7px;letter-spacing:.2em;color:var(--c);opacity:.5}

.lang-selector{display:flex;align-items:center;gap:2px;background:var(--sf);
  border:1px solid var(--br);padding:3px;flex-shrink:0}
.lbtn{background:transparent;border:none;color:var(--td);padding:4px 10px;
  font-family:var(--font-mo);font-size:8px;letter-spacing:.1em;cursor:pointer;
  display:flex;align-items:center;gap:4px;transition:all .16s}
.lbtn i{font-size:10px}
.lbtn:hover{background:var(--cg);color:var(--tx)}
.lbtn.active{background:var(--cg);color:var(--c)}

.tbtn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;
  border:1px solid var(--br);background:var(--sf);color:var(--tx);
  font-family:var(--font-mo);font-size:8px;letter-spacing:.1em;cursor:pointer;transition:all .16s;
  clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);flex-shrink:0}
.tbtn:hover{border-color:var(--c);color:var(--c);background:var(--cg)}
.tbtn:active{transform:translateY(1px)}
.tbtn.primary{background:var(--c);border-color:var(--c);color:var(--bg);font-weight:700}
.tbtn.primary:hover{background:var(--cd);box-shadow:0 0 14px rgba(0,245,255,.35)}

.h-spacer{flex:1}
.file-stats{display:flex;align-items:center;gap:7px;flex-shrink:0}
.stat-badge{background:var(--sf);padding:3px 8px;border:1px solid var(--br);
  display:flex;align-items:center;gap:4px;font-family:var(--font-mo);font-size:8px;color:var(--td)}
.stat-badge i{color:var(--c);font-size:9px}

/* ════════ PROJECT BAR ════════ */
#project-bar{background:rgba(3,8,14,.95);border-bottom:1px solid var(--br2);
  display:flex;align-items:center;gap:10px;padding:0 14px;z-index:90}
.pb-label{font-family:var(--font-mo);font-size:8px;letter-spacing:.2em;color:var(--td);display:flex;align-items:center;gap:6px}
.pb-label i{color:var(--c)}
.pb-dot{width:5px;height:5px;border-radius:50%;background:var(--go);box-shadow:0 0 5px var(--go);flex-shrink:0;
  animation:pulse 2s ease-in-out infinite}

@keyframes pulse{0%,100%{opacity:1} 50%{opacity:.5}}

#proj-select{background:var(--sf);border:1px solid var(--br);color:var(--tx);
  padding:4px 10px;font-family:var(--font-mo);font-size:9px;outline:none;cursor:pointer;flex:1;max-width:320px;
  transition:all .16s}
#proj-select:hover{border-color:var(--c)}
#proj-select:focus{border-color:var(--c);background:var(--cg)}

#proj-info{font-family:var(--font-mo);font-size:8px;color:var(--td);display:flex;align-items:center;gap:10px}
#proj-info span{display:flex;align-items:center;gap:4px}

.pb-files{position:relative;flex-shrink:0}
.file-dropdown{position:absolute;top:calc(100% + 6px);right:0;z-index:500;
  background:rgba(3,8,14,.98);border:1px solid var(--c);min-width:280px;max-width:360px;
  display:none;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.5);
  animation:slideDown .2s ease}
.file-dropdown.open{display:flex}

@keyframes slideDown{from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)}}

.fd-hdr{padding:8px 12px;border-bottom:1px solid var(--br);font-family:var(--font-mo);font-size:8px;color:var(--c)}
.fd-list{max-height:260px;overflow-y:auto;padding:6px}
.fd-list::-webkit-scrollbar{width:4px}
.fd-list::-webkit-scrollbar-track{background:var(--bg)}
.fd-list::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.fd-item{display:flex;align-items:center;gap:8px;padding:7px 9px;cursor:pointer;transition:all .15s;
  border:1px solid transparent}
.fd-item:hover{border-color:var(--c);background:var(--cg)}
.fd-item-name{font-family:var(--font-mo);font-size:9px;color:var(--tx);flex:1}
.fd-item-meta{font-family:var(--font-mo);font-size:7px;color:var(--td)}
.fd-empty{padding:20px;text-align:center;color:var(--td);font-family:var(--font-mo);font-size:9px}

.pb-conn{font-family:var(--font-mo);font-size:8px;display:flex;align-items:center;gap:5px}
.conn-dot{width:5px;height:5px;border-radius:50%;background:var(--td)}
.conn-dot.online{background:var(--gr);box-shadow:0 0 5px var(--gr)}
.conn-dot.error{background:var(--re);box-shadow:0 0 5px var(--re)}

/* ════════ TABBAR ════════ */
#tabbar{background:var(--bg2);border-bottom:1px solid var(--br);
  display:flex;align-items:center;padding:0 8px;overflow-x:auto;gap:2px}
#tabbar::-webkit-scrollbar{height:3px}
#tabbar::-webkit-scrollbar-track{background:var(--bg)}
#tabbar::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.tab{display:flex;align-items:center;gap:6px;padding:0 13px;height:34px;
  background:var(--bg2);color:var(--td);border-right:1px solid var(--br2);
  cursor:pointer;font-family:var(--font-mo);font-size:8px;letter-spacing:.1em;
  border-bottom:2px solid transparent;flex-shrink:0;transition:all .16s}
.tab i{font-size:10px}
.tab:hover{background:var(--cg);color:var(--tx)}
.tab.active{background:rgba(0,245,255,.05);color:var(--c);border-bottom-color:var(--c)}
.tab.modified::after{content:'●';color:var(--go);margin-left:4px;font-size:10px}
.tab-close{opacity:0;width:14px;height:14px;display:flex;align-items:center;justify-content:center;
  transition:opacity .16s}
.tab:hover .tab-close{opacity:1}
.tab-close:hover i{color:var(--re)!important}
.tab-add{width:30px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--td);
  cursor:pointer;transition:all .16s}
.tab-add:hover{color:var(--c);background:var(--cg)}

/* ════════ EDITOR AREA ════════ */
/* ════════ EDITOR AREA - CORREGIDO ════════ */
#editor-container {
  background: var(--bg2);
  overflow: hidden;
  display: flex;
  position: relative;
  height: 100%;
}

.editor-wrap {
  display: flex;
  width: 100%;
  height: 100%;
  position: relative;
  overflow: hidden;
}

/* Gutter - line numbers with breakpoints */
.line-numbers {
  width: var(--gutter-width);
  background: var(--bg);
  border-right: 1px solid var(--br);
  user-select: none;
  overflow-y: auto; /* Cambiado a auto para que haga scroll con el contenido */
  overflow-x: hidden;
  flex-shrink: 0;
  font-family: var(--font-code);
  font-size: 13px;
  line-height: var(--lh);
  color: var(--td);
  position: relative;
  height: 100%; /* Altura fija */
}

/* Scroll personalizado para line-numbers */
.line-numbers::-webkit-scrollbar {
  width: 0px; /* Oculto para no duplicar scrollbars */
  background: transparent;
}

.line-numbers-inner {
  padding-top: 14px;
  padding-bottom: 14px;
}

.line-number {
  padding: 0 10px 0 8px;
  height: var(--lh);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  cursor: pointer;
  transition: all .15s;
  position: relative;
}

.line-number:hover {
  background: rgba(0,245,255,.03);
}

.line-number.current {
  color: var(--c);
  background: rgba(0,245,255,.04);
  border-right: 2px solid var(--c);
}

/* Breakpoint styling */
.line-number.bp {
  background: rgba(255,34,68,.08);
}

.line-number.bp .ln-text {
  color: var(--re);
}

.line-number.bp::before {
  content: '●';
  position: absolute;
  left: 6px;
  font-size: 10px;
  color: var(--re);
  text-shadow: 0 0 6px var(--re);
  animation: bpPulse 1.5s ease-in-out infinite;
}

@keyframes bpPulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: .7; transform: scale(1.15); }
}

.ln-text {
  flex: 1;
  text-align: right;
}

/* Editor scroll container - CORREGIDO */
.editor-scroll {
  flex: 1;
  overflow: auto;
  position: relative;
  background: var(--bg2);
  height: 100%;
}

.editor-scroll::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

.editor-scroll::-webkit-scrollbar-track {
  background: var(--bg);
  border-left: 1px solid var(--br2);
}

.editor-scroll::-webkit-scrollbar-thumb {
  background: rgba(0,245,255,.2);
  border-radius: 4px;
  border: 2px solid var(--bg);
}

.editor-scroll::-webkit-scrollbar-thumb:hover {
  background: rgba(0,245,255,.35);
}

.editor-scroll::-webkit-scrollbar-corner {
  background: var(--bg);
}

/* Editor layers - CORREGIDO */
.editor-layers {
  position: relative;
  width: 100%;
  height: auto;
  min-height: 100%;
  display: block;
}

/* Current line highlight */
.current-line-highlight {
  position: absolute;
  left: 0;
  right: 0;
  height: var(--lh);
  background: rgba(0,245,255,.045);
  border-left: 2px solid rgba(0,245,255,.6);
  pointer-events: none;
  z-index: 1;
  transition: top .08s ease-out;
}

/* Syntax highlight layer - CORREGIDO */
.syntax-highlight {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 14px 16px;
  font-family: var(--font-code);
  font-size: 13px;
  line-height: var(--lh);
  white-space: pre;
  pointer-events: none;
  z-index: 2;
  color: var(--tx);
  overflow: hidden; /* Evita scroll interno */
  word-wrap: normal;
  overflow-wrap: normal;
}

/* Editor textarea - CORREGIDO */
.editor-code {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 14px 16px;
  background: transparent;
  font-family: var(--font-code);
  font-size: 13px;
  line-height: var(--lh);
  color: transparent;
  caret-color: var(--tx);
  outline: none;
  tab-size: 4;
  white-space: pre;
  border: none;
  resize: none;
  z-index: 3;
  overflow: hidden; /* Importante: el scroll lo maneja el contenedor padre */
  word-wrap: normal;
  overflow-wrap: normal;
}

.editor-code::selection {
  background: rgba(0,245,255,.22);
}

/* Syntax colors */
.syn-keyword { color: #ff79c6; font-weight: 500; }
.syn-string { color: #f1fa8c; }
.syn-number { color: #bd93f9; }
.syn-comment { color: #6272a4; font-style: italic; }
.syn-function { color: #50fa7b; }
.syn-operator { color: #ff5555; }
.syn-tag { color: #ff79c6; }
.syn-attribute { color: #50fa7b; }
.syn-value { color: #f1fa8c; }
.syn-selector { color: #8be9fd; }
.syn-property { color: #66d9ef; }

/* Minimap - OPTIMIZED with drag */








/* ════════ STATUS BAR ════════ */
#statusbar{background:rgba(2,5,9,.97);border-top:1px solid var(--br);
  padding:0 14px;display:flex;align-items:center;justify-content:space-between;
  font-family:var(--font-mo);font-size:8px;color:var(--td)}
.sl,.sr{display:flex;align-items:center;gap:12px}
.si{display:flex;align-items:center;gap:4px;padding:0 4px;transition:color .16s;cursor:default}
.si:hover{color:var(--c)}
.si i{color:var(--c);font-size:8px}
.ssep{width:1px;height:10px;background:var(--br)}
.lang-chip{color:var(--c);font-weight:700;background:var(--cg);padding:1px 7px;border:1px solid var(--br)}

/* ════════ TOAST ════════ */
#toast-ct{position:fixed;bottom:30px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:rgba(3,8,14,.98);border:1px solid;padding:8px 13px;font-family:var(--font-mo);font-size:9px;
  display:flex;align-items:center;gap:7px;max-width:300px;animation:toastIn .3s ease;
  box-shadow:0 4px 16px rgba(0,0,0,.4)}
.toast.ok{border-color:var(--gr);color:var(--gr)}
.toast.err{border-color:var(--re);color:var(--re)}
.toast.info{border-color:var(--c);color:var(--c)}

@keyframes toastIn{from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)}}
</style>
</head>

<script>
<script>
/* ════════════════════════════════════════════
   AETHERYON IDE — JavaScript v5.0 (Cloud)
   Auth-aware · R2 storage · Sync with Bitácora
════════════════════════════════════════════════ */

// ── AUTH ──────────────────────────────────────
// Token is shared via sessionStorage (same origin as Bitácora)
// or passed via URL param ?token=... when opening in new tab
function getToken() {
  // 1. URL param (passed from Bitácora when opening new tab)
  const urlToken = new URLSearchParams(window.location.search).get('token');
  if (urlToken) {
    // Persist for this session
    try { sessionStorage.setItem('aetheryon_token', urlToken); } catch(_) {}
    return urlToken;
  }
  // 2. sessionStorage (same origin)
  try { return sessionStorage.getItem('aetheryon_token'); } catch(_) { return null; }
}

function authHeaders(extra = {}) {
  const t = getToken();
  return {
    'Content-Type': 'application/json',
    ...(t ? { 'Authorization': `Bearer ${t}` } : {}),
    ...extra
  };
}

async function authFetch(url, opts = {}) {
  const t = getToken();
  const headers = {
    ...(t ? { 'Authorization': `Bearer ${t}` } : {}),
    ...(opts.headers || {})
  };
  const res = await fetch(url, { ...opts, headers });
  if (res.status === 401) {
    showToast('Sesión expirada — recarga la página', 'err');
  }
  return res;
}

// ── API BASE ──────────────────────────────────
// In cloud (Render), IDE serves from same origin as API.
// URL param ?api= allows override for local dev.
function getAPIBase() {
  if (window._API_BASE_OVERRIDE) return window._API_BASE_OVERRIDE;
  const urlApi = new URLSearchParams(window.location.search).get('api');
  if (urlApi) return urlApi.replace(/\/api$/, '');
  return window.location.origin;
}

// ── STATE ─────────────────────────────────────
let tabs = [];
let activeTabId = null;
let nextTabId = 1;
let minimapDragging = false;
let projects = [];
let activeProject = null;

// ── TAB STRUCTURE ─────────────────────────────
function createTab(name = 'untitled', lang = 'python', content = '', fileInfo = null) {
  const id = nextTabId++;
  const tab = {
    id, name, lang, content,
    savedContent: content,
    modified: false,
    breakpoints: new Set(),
    currentLine: 1, currentCol: 1,
    scrollTop: 0, scrollLeft: 0,
    fileInfo
  };
  tabs.push(tab);
  return tab;
}
function getActiveTab() { return tabs.find(t => t.id === activeTabId); }
function getTabById(id) { return tabs.find(t => t.id === id); }
function removeTab(id) {
  const i = tabs.findIndex(t => t.id === id);
  if (i !== -1) tabs.splice(i, 1);
}

/* ════════════════════════════════════════════
   SYNTAX HIGHLIGHTING
════════════════════════════════════════════════ */
function highlightSyntax(code, lang) {
  code = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if (lang === 'python')     return highlightPython(code);
  if (lang === 'javascript') return highlightJavaScript(code);
  if (lang === 'html')       return highlightHTML(code);
  if (lang === 'css')        return highlightCSS(code);
  if (lang === 'dockerfile') return highlightDockerfile(code);
  return code;
}

function highlightPython(code) {
  const kw = /\b(def|class|if|elif|else|for|while|return|import|from|as|try|except|finally|with|lambda|yield|async|await|pass|break|continue|global|nonlocal|assert|raise|del|in|is|not|and|or|True|False|None)\b/g;
  code = code.replace(kw, '<span class="syn-keyword">$1</span>');
  code = code.replace(/\b([a-zA-Z_]\w*)\s*(?=\()/g, '<span class="syn-function">$1</span>');
  code = code.replace(/\b(\d+\.?\d*)\b/g, '<span class="syn-number">$1</span>');
  return code;
}
function highlightJavaScript(code) {
  const kw = /\b(function|const|let|var|if|else|for|while|do|switch|case|break|return|class|extends|import|export|from|default|async|await|try|catch|finally|throw|new|this|super|static|typeof|instanceof|in|of|delete|void|null|undefined|true|false)\b/g;
  code = code.replace(kw, '<span class="syn-keyword">$1</span>');
  code = code.replace(/\b([a-zA-Z_$]\w*)\s*(?=\()/g, '<span class="syn-function">$1</span>');
  code = code.replace(/\b(\d+\.?\d*)\b/g, '<span class="syn-number">$1</span>');
  return code;
}
function highlightHTML(code) {
  code = code.replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="syn-comment">$1</span>');
  code = code.replace(/(&lt;\/?)([\w-]+)(.*?)(&gt;)/g, (m, open, tag, content, close) => {
    content = content.replace(/\s([\w-]+)(?==)/g, ' <span class="syn-attribute">$1</span>');
    content = content.replace(/(["'])(.*?)\1/g, '<span class="syn-value">$1$2$1</span>');
    return open + '<span class="syn-tag">' + tag + '</span>' + content + close;
  });
  return code;
}
function highlightCSS(code) {
  code = code.replace(/^([.#]?[\w-]+\s*[,{])/gm, '<span class="syn-selector">$1</span>');
  code = code.replace(/\b([\w-]+)(?=\s*:)/g, '<span class="syn-property">$1</span>');
  code = code.replace(/(["'])(.*?)\1/g, '<span class="syn-string">$1$2$1</span>');
  code = code.replace(/\b(\d+\.?\d*(?:px|em|rem|%|vh|vw)?)\b/g, '<span class="syn-number">$1</span>');
  return code;
}
function highlightDockerfile(code) {
  const kw = /\b(FROM|RUN|CMD|LABEL|EXPOSE|ENV|ADD|COPY|ENTRYPOINT|VOLUME|USER|WORKDIR|ARG|ONBUILD|STOPSIGNAL|HEALTHCHECK|SHELL)\b/g;
  code = code.replace(/(#.*$)/gm, '<span class="syn-comment">$1</span>');
  code = code.replace(/(["'])((?:\\.|(?!\1).)*?)\1/g, '<span class="syn-string">$1$2$1</span>');
  code = code.replace(kw, '<span class="syn-keyword">$1</span>');
  return code;
}

window.addEventListener('DOMContentLoaded', async () => {
  initEditor();
  await checkAPIConnection();
  await loadProjects();

  if (window.parent !== window) {
    window.parent.postMessage({ type: 'IDE_READY' }, '*');
  }

  // Read URL params: ?proj=&file=&name=&ext=&token=
  const _p = new URLSearchParams(window.location.search);
  const _projId   = _p.get('proj');
  const _filePath = _p.get('file');
  const _fileName = _p.get('name');
  const _fileExt  = _p.get('ext') || '';

  if (_projId && _filePath) {
    // Ensure project is in list
    if (!projects.find(p => p.id === _projId)) await loadProjects();
    const sel = document.getElementById('proj-select');
    if (sel) { sel.value = _projId; onProjectChange(); }
    await openFileFromAPI(_projId, _filePath, _fileName || _filePath.split('/').pop(), _fileExt);
    // Clean URL (keep it tidy but keep token param for refresh)
    const clean = new URL(window.location.href);
    ['proj','file','name','ext'].forEach(k => clean.searchParams.delete(k));
    window.history.replaceState({}, '', clean.toString());
  }

  document.addEventListener('click', (e) => {
    const dd = document.getElementById('fileDropdown');
    if (!e.target.closest('.pb-files') && dd.classList.contains('open')) {

function renderTabs() {
  const bar = document.getElementById('tabbar');
  if (!bar) return;
  bar.innerHTML = tabs.map(tab => `
    <div class="tab ${tab.id === activeTabId ? 'active' : ''} ${tab.modified ? 'modified' : ''}"
         onclick="switchToTab(${tab.id})">
      <i class="${fileIconClass(tab.name)}" style="font-size:10px"></i>
      <span>${escH(tab.name)}</span>
      <span class="tab-close" onclick="closeTab(event,${tab.id})"><i class="fas fa-times" style="color:var(--td);font-size:9px"></i></span>
    </div>`).join('') +
    `<div class="tab-add" onclick="newFile()" title="Nuevo archivo"><i class="fas fa-plus" style="font-size:10px"></i></div>`;
}

function fileIconClass(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  const m = { py:'fab fa-python', js:'fab fa-js-square', ts:'fab fa-js-square',
              jsx:'fab fa-react', tsx:'fab fa-react', html:'fab fa-html5',
              css:'fab fa-css3-alt', json:'fas fa-code', sh:'fas fa-terminal',
              md:'fas fa-file-alt', sql:'fas fa-database', java:'fab fa-java',
              php:'fab fa-php', go:'fas fa-file-code', rs:'fas fa-file-code',
              yaml:'fas fa-file-code', yml:'fas fa-file-code', dockerfile:'fab fa-docker' };
  return m[ext] || 'fas fa-file-code';
}

function switchToTab(id) {
  const cur = getActiveTab();
  if (cur) { cur.scrollTop = document.querySelector('.editor-scroll')?.scrollTop || 0; }
  activeTabId = id;
  renderTabs();
  renderEditor();
}

function closeTab(e, id) {
  e.stopPropagation();
  const tab = getTabById(id);
  if (tab && tab.modified) {
    if (!confirm(`"${tab.name}" tiene cambios sin guardar. ¿Cerrar igual?`)) return;
  }
  removeTab(id);
  if (activeTabId === id) {
    activeTabId = tabs.length ? tabs[tabs.length - 1].id : null;
    if (!tabs.length) {
      const t = createTab('untitled.py','python',''); t._isWelcome = true; activeTabId = t.id;
    }
  }
  renderTabs();
  renderEditor();
}

function newFile() {
  const tab = createTab('untitled.py', 'python', '');
  activeTabId = tab.id;
  renderTabs();
  renderEditor();
  updateEditorStats('');
}

function renderEditor() {
  const tab = getActiveTab();
  const wrap = document.getElementById('editorWrap');
  if (!tab || !wrap) return;
  wrap.innerHTML = `
    <div class="line-numbers" id="lineNumbers"><div class="line-numbers-inner" id="lineNumInner"></div></div>
    <div class="editor-scroll" id="editorScroll">
      <div class="editor-layers" id="editorLayers">
        <div class="current-line-highlight" id="curLineHL"></div>
        <div class="syntax-highlight" id="syntaxHL" aria-hidden="true"></div>
        <textarea class="editor-code" id="editorTA" spellcheck="false" autocorrect="off"
          autocapitalize="off" wrap="off"
          onkeydown="handleEditorKey(event)"
          oninput="onEditorInput()"
          onscroll="syncScroll()"
          onclick="updateCursor()"
          onkeyup="updateCursor()"
        ></textarea>
      </div>
    </div>`;

  const ta = document.getElementById('editorTA');
  ta.value = tab.content;
  updateSyntax(tab.content, tab.lang);
  updateLineNumbers(tab.content);
  updateEditorStats(tab.content);
  updateLangChip(tab.lang);

  // Restore scroll
  requestAnimationFrame(() => {
    const scroll = document.getElementById('editorScroll');
    if (scroll) scroll.scrollTop = tab.scrollTop || 0;
    ta.focus();
    updateCursor();
  });
}

function onEditorInput() {
  const tab = getActiveTab();
  if (!tab) return;
  const ta = document.getElementById('editorTA');
  const content = ta.value;
  const wasModified = tab.modified;
  tab.content = content;
  tab.modified = content !== tab.savedContent;
  updateSyntax(content, tab.lang);
  updateLineNumbers(content);
  updateEditorStats(content);
  if (tab.modified !== wasModified) renderTabs();
  updateCursor();
}

function syncScroll() {
  const scroll = document.getElementById('editorScroll');
  const hl = document.getElementById('syntaxHL');
  const ln = document.getElementById('lineNumbers');
  if (!scroll) return;
  if (hl) { hl.style.top = `-${scroll.scrollTop}px`; hl.style.left = `-${scroll.scrollLeft}px`; }
  if (ln) ln.scrollTop = scroll.scrollTop;
}

function updateSyntax(content, lang) {
  const hl = document.getElementById('syntaxHL');
  if (!hl) return;
  hl.innerHTML = highlightSyntax(content, lang);
  // Resize layers to match content
  const ta = document.getElementById('editorTA');
  if (ta) {
    const h = Math.max(ta.scrollHeight, 400);
    const w = Math.max(ta.scrollWidth, 600);
    hl.style.width = w + 'px';
    hl.style.minHeight = h + 'px';
    ta.style.minHeight = h + 'px';
    ta.style.width = w + 'px';
    document.getElementById('editorLayers').style.minHeight = h + 'px';
  }
}

function updateLineNumbers(content) {
  const inner = document.getElementById('lineNumInner');
  if (!inner) return;
  const lines = content.split('\n');
  const tab = getActiveTab();
  const bp = tab ? tab.breakpoints : new Set();
  inner.innerHTML = lines.map((_, i) => {
    const n = i + 1;
    const hasBp = bp.has(n);
    return `<div class="line-number ${hasBp ? 'bp' : ''}" onclick="toggleBreakpoint(${n})">
      <span class="ln-text">${n}</span></div>`;
  }).join('');
}

function updateCursor() {
  const ta = document.getElementById('editorTA');
  const tab = getActiveTab();
  if (!ta || !tab) return;
  const text = ta.value.substring(0, ta.selectionStart);
  const lines = text.split('\n');
  const ln = lines.length;
  const col = lines[lines.length - 1].length + 1;
  tab.currentLine = ln; tab.currentCol = col;
  setEl('sb-ln', ln); setEl('sb-col', col);
  // Highlight current line
  const hl = document.getElementById('curLineHL');
  if (hl) {
    const lhPx = 23.4;
    hl.style.top = ((ln - 1) * lhPx) + 'px';
  }
  // Sync line number highlight
  document.querySelectorAll('.line-number').forEach((el, i) => {
    el.classList.toggle('current', i + 1 === ln);
  });
}

function updateEditorStats(content) {
  const lines = content.split('\n').length;
  const chars = content.length;
  const bytes = new TextEncoder().encode(content).length;
  setEl('lineCount', lines);
  setEl('charCount', chars);
  setEl('sizeCount', bytes < 1024 ? bytes : Math.round(bytes/1024));
  document.getElementById('sizeCount') && (document.getElementById('sizeCount').nextSibling
    ? document.getElementById('sizeCount').nextSibling.textContent = bytes < 1024 ? 'B' : 'KB'
    : null);
}

function toggleBreakpoint(lineNum) {
  const tab = getActiveTab();
  if (!tab) return;
  if (tab.breakpoints.has(lineNum)) tab.breakpoints.delete(lineNum);
  else tab.breakpoints.add(lineNum);
  const ta = document.getElementById('editorTA');
  updateLineNumbers(ta ? ta.value : tab.content);
  setEl('bpCount', tab.breakpoints.size);
}

function handleEditorKey(e) {
  const ta = e.target;
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.substring(0, s) + '    ' + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = s + 4;
    onEditorInput();
    return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    const s = ta.selectionStart;
    const lines = ta.value.substring(0, s).split('\n');
    const curLine = lines[lines.length - 1];
    const indent = curLine.match(/^(\s*)/)[1];
    const extra = curLine.trimEnd().endsWith(':') ? '    ' : '';
    const ins = '\n' + indent + extra;
    ta.value = ta.value.substring(0, s) + ins + ta.value.substring(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s + ins.length;
    onEditorInput();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === '/') {
    e.preventDefault();
    toggleComment(ta);
    return;
  }
}

function toggleComment(ta) {
  const s = ta.selectionStart, end = ta.selectionEnd;
  const lines = ta.value.split('\n');
  let startLine = ta.value.substring(0, s).split('\n').length - 1;
  let endLine   = ta.value.substring(0, end).split('\n').length - 1;
  const prefix = '# ';
  const allCommented = lines.slice(startLine, endLine + 1).every(l => l.trimStart().startsWith('#'));
  for (let i = startLine; i <= endLine; i++) {
    lines[i] = allCommented ? lines[i].replace(/^(\s*)#\s?/, '$1') : prefix + lines[i];
  }
  ta.value = lines.join('\n');
  onEditorInput();
}

function setLang(lang) {

}

function updateLangChip(lang) {
  const names = { python:'PYTHON', javascript:'JS', html:'HTML', css:'CSS', dockerfile:'DOCKERFILE', other:'OTHER' };
  setEl('langChip', names[lang] || lang.toUpperCase());
  document.querySelectorAll('.lbtn').forEach(b => {
    const txt = b.textContent.trim().toLowerCase();
    b.classList.toggle('active', txt === lang || (lang==='javascript' && txt==='js'));
  });
}

function getExtForLang(lang) {
  return { python:'.py', javascript:'.js', html:'.html', css:'.css', dockerfile:'', other:'.txt' }[lang] || '.txt';
}

   FILE OPERATIONS
════════════════════════════════════════════════ */
async function saveFile() {
  const tab = getActiveTab();
  if (!tab) return;
  if (tab.fileInfo && tab.fileInfo.project_id && tab.fileInfo.path) {
    try {
      const res = await authFetch(`${getAPIBase()}/api/projects/${tab.fileInfo.project_id}/save-file`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: tab.fileInfo.path, content: tab.content })
      });
      if (res.ok) {
        tab.savedContent = tab.content;
        tab.modified = false;
        renderTabs();
        showToast(`✓ Guardado: ${tab.name}`, 'ok');
        return;
      }
      showToast('Error del servidor — descargando localmente', 'err');
    } catch(e) {
      showToast('Sin conexión — descargando localmente', 'err');
    }
  }
  downloadCode();
}

function downloadCode() {
  const tab = getActiveTab();
  if (!tab) return;
  const blob = new Blob([tab.content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = tab.name; a.click();
  URL.revokeObjectURL(url);
  tab.savedContent = tab.content;
  tab.modified = false;
  renderTabs();
  showToast(`Descargado: ${tab.name}`, 'ok');
}

async function checkAPIConnection() {

    const res = await authFetch(`${getAPIBase()}/api/health`, { signal: AbortSignal.timeout(4000) });

      if (label) label.textContent = 'API ONLINE';

async function loadProjects() {
  try {
    const res = await authFetch(`${getAPIBase()}/api/projects`);
    if (!res.ok) return;
    const data = await res.json();
    projects = data.projects || [];
    renderProjectSelect();
  } catch(_) {}

function renderProjectSelect() {
  const sel = document.getElementById('proj-select');
  if (!sel) return;
  const prev = sel.value;
  sel.innerHTML = '<option value="">── Seleccionar proyecto ──</option>';
  projects.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = `${p.name} [${p.category || 'GENERAL'}]`;
    sel.appendChild(opt);
  });
  if (prev && projects.find(p => p.id === prev)) sel.value = prev;

function onProjectChange() {
  const pid = document.getElementById('proj-select').value;
  if (!pid) {
    activeProject = null;
    document.getElementById('pi-files').style.display = 'none';
    document.getElementById('pi-size').style.display = 'none';
    document.getElementById('fdList').innerHTML = '<div class="fd-empty">Selecciona un proyecto</div>';
    return;
  }
  activeProject = projects.find(p => p.id === pid) || null;
  if (activeProject) {
    document.getElementById('pi-files').style.display = 'flex';
    document.getElementById('pi-size').style.display  = 'flex';
    setEl('pi-fc', activeProject.file_count || 0);
    setEl('pi-sz', activeProject.total_size || '0 B');
    loadProjectFiles(pid);
    showToast(`Proyecto: ${activeProject.name}`, 'info');
  }
}

// Editable file extensions
const IDE_EDITABLE_EXTS = new Set([
  '.py','.js','.ts','.jsx','.tsx','.mjs','.cjs',
  '.html','.htm','.css','.scss','.sass','.less',
  '.txt','.md','.markdown','.json','.jsonc',
  '.sh','.bash','.zsh','.fish','.ps1','.bat','.cmd',
  '.yaml','.yml','.toml','.ini','.cfg','.conf','.env',
  '.xml','.svg','.log','.csv','.tsv',
  '.go','.rs','.java','.c','.cpp','.cc','.h','.hpp',
  '.rb','.php','.r','.lua','.pl','.swift','.kt','.cs',
  '.sql','.graphql','.proto','.tf','.hcl',
  '.dockerfile','.gitignore','.editorconfig','.htaccess'
]);

function isEditableFile(f) {
  const ext  = (f.ext || '').toLowerCase();
  const name = (f.name || '').toLowerCase();
  if (['video','image','audio'].includes(f.type)) return false;
  if (IDE_EDITABLE_EXTS.has(ext)) return true;
  if (!ext && IDE_EDITABLE_EXTS.has(name)) return true;
  return false;
}

function fileIcon(f) {
  const e = (f.ext || '').toLowerCase();
  const m = {'.py':'fab fa-python','.js':'fab fa-js-square','.ts':'fab fa-js-square',
             '.jsx':'fab fa-react','.tsx':'fab fa-react','.html':'fab fa-html5',
             '.htm':'fab fa-html5','.css':'fab fa-css3-alt','.json':'fas fa-code',
             '.sh':'fas fa-terminal','.bash':'fas fa-terminal','.md':'fas fa-file-alt',
             '.sql':'fas fa-database','.java':'fab fa-java','.php':'fab fa-php',
             '.rb':'fas fa-gem','.go':'fas fa-file-code','.rs':'fas fa-file-code',
             '.yaml':'fas fa-file-code','.yml':'fas fa-file-code'};
  return m[e] || 'fas fa-file-code';
}

async function loadProjectFiles(pid) {
  const list = document.getElementById('fdList');
  list.innerHTML = '<div class="fd-empty"><i class="fas fa-spinner fa-spin"></i> Cargando...</div>';
  try {
    const res = await authFetch(`${getAPIBase()}/api/projects/${pid}/files`);
    if (!res.ok) throw new Error();
    const data  = await res.json();
    const all   = data.files || [];
    const files = all.filter(f => isEditableFile(f));

    if (!files.length) {
      list.innerHTML = all.length
        ? `<div class="fd-empty">Sin archivos de código<br><small style="opacity:.5">${all.length} archivo(s) binario(s) excluido(s)</small></div>`
        : '<div class="fd-empty">Sin archivos en el proyecto</div>';
      return;
    }
    list.innerHTML = files.map(f => `
      <div class="fd-item" onclick="openFileFromAPI('${pid}','${escH(f.path)}','${escH(f.name)}','${f.ext||''}')">
        <i class="${fileIcon(f)}" style="color:var(--c)"></i>
        <span class="fd-item-name">${escH(f.name)}</span>
        <span class="fd-item-meta">${f.size_human}</span>
      </div>`).join('');
  } catch(_) {
    list.innerHTML = '<div class="fd-empty" style="color:var(--re)">Error al cargar archivos</div>';
  }
}

async function openFileFromAPI(pid, path, name, ext) {
  try {
    // Fetch file content from R2 via API proxy (auth required)
    const res = await authFetch(`${getAPIBase()}/api/projects/${pid}/files/${path}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();

    const extMap = {
      py:'python', js:'javascript', ts:'javascript', jsx:'javascript', tsx:'javascript',
      mjs:'javascript', cjs:'javascript',
      html:'html', htm:'html', css:'css', scss:'css',
      json:'other', jsonc:'other', md:'other', markdown:'other',
      sh:'other', bash:'other', zsh:'other', yaml:'other', yml:'other',
      xml:'other', svg:'other', toml:'other', ini:'other', cfg:'other',
      sql:'other', go:'other', rs:'other', java:'other', c:'other', cpp:'other',
      rb:'other', php:'other', dockerfile:'dockerfile', tf:'other', kt:'other', cs:'other'
    };
    const cleanExt = ext.replace('.','').toLowerCase();
    const lang     = extMap[cleanExt] || 'other';

    // If already open, just activate
    const existingTab = tabs.find(t =>
      t.fileInfo && t.fileInfo.path === path && t.fileInfo.project_id === pid);
    if (existingTab) {
      activeTabId = existingTab.id;
      renderTabs(); renderEditor();
      showToast(`Ya abierto: ${name}`, 'info');
      document.getElementById('fileDropdown').classList.remove('open');
      return;
    }

    // Replace welcome tab if unmodified
    const welcomeIdx = tabs.findIndex(t => t._isWelcome && !t.modified);
    if (welcomeIdx !== -1) tabs.splice(welcomeIdx, 1);

    const newTab = createTab(name, lang, text, { path, project_id: pid });
    newTab.savedContent = text;
    activeTabId = newTab.id;
    renderTabs();
    renderEditor();
    showToast(`📂 ${name}`, 'ok');
    document.getElementById('fileDropdown').classList.remove('open');

    // Update project selector to match opened project
    const sel = document.getElementById('proj-select');
    if (sel && sel.value !== pid) {
      sel.value = pid;
      onProjectChange();
    }
  } catch(err) {
    showToast(`Error al abrir: ${name} (${err.message})`, 'err');
  }
}

/* ════════════════════════════════════════════
   UI HELPERS
════════════════════════════════════════════════ */
function toggleFileDropdown() {
  const dd = document.getElementById('fileDropdown');
  dd.classList.toggle('open');
  if (dd.classList.contains('open') && activeProject) {
    loadProjectFiles(activeProject.id);
  }
}

function showToast(msg, type = 'info') {
  const ct = document.getElementById('toast-ct');
  if (!ct) return;
  const t = document.createElement('div');
  const icons = { ok:'fa-circle-check', err:'fa-circle-exclamation', info:'fa-circle-info' };
  t.className = `toast ${type}`;
  t.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i><span>${msg}</span>`;
  ct.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setEl(id, v) { const e = document.getElementById(id); if (e) e.textContent = v; }

/* ════════════════════════════════════════════
   KEYBOARD SHORTCUTS
════════════════════════════════════════════════ */
function handleGlobalKeydown(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveFile(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); newFile(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'w') {
    e.preventDefault();
    const tab = getActiveTab();
    if (tab) closeTab(new Event('click'), tab.id);
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Tab') {
    e.preventDefault();
    const cur = tabs.findIndex(t => t.id === activeTabId);
    const next = (cur + 1) % tabs.length;
    if (tabs[next]) switchToTab(tabs[next].id);
  }
  if (e.key === 'F9') {
    e.preventDefault();
    const tab = getActiveTab();
    if (tab) toggleBreakpoint(tab.currentLine);
  }
}

/* ════════════════════════════════════════════
   POSTMESSAGE BRIDGE — from Bitácora parent
════════════════════════════════════════════════ */
window.addEventListener('message', async (event) => {
  const msg = event.data;
  if (!msg || !msg.type) return;

  if (msg.type === 'SYNC_PROJECTS') {
    if (msg.apiUrl) window._API_BASE_OVERRIDE = msg.apiUrl.replace('/api', '');
    if (msg.token)  { try { sessionStorage.setItem('aetheryon_token', msg.token); } catch(_) {} }
    projects = msg.projects || [];
    renderProjectSelect();
  }

  if (msg.type === 'OPEN_FILE') {
    const { projId, file: f, apiUrl, token } = msg;
    if (apiUrl)  window._API_BASE_OVERRIDE = apiUrl.replace('/api', '');
    if (token)   { try { sessionStorage.setItem('aetheryon_token', token); } catch(_) {} }
    if (!projects.find(p => p.id === projId)) await loadProjects();
    const sel = document.getElementById('proj-select');
    if (sel) { sel.value = projId; onProjectChange(); }
    await openFileFromAPI(projId, f.path, f.name, f.ext || '');
  }
});

</script>
